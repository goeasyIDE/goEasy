<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>openIDE • access</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234ea8de'%3E%3Cpath d='M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0a0c10;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    color: #eef2ff;
  }

  /* clean, minimal card without overlays */
  .card {
    width: 100%;
    max-width: 380px;
    background: #111418;
    border-radius: 28px;
    border: 1px solid rgba(78, 168, 222, 0.2);
    padding: 2rem 1.75rem 2rem;
    transition: border-color 0.2s;
    box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.4);
  }

  .card:hover {
    border-color: rgba(78, 168, 222, 0.4);
  }

  /* brand section - minimal */
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 1.8rem;
    gap: 0.75rem;
  }

  .brand-icon {
    width: 52px;
    height: 52px;
    background: linear-gradient(145deg, #1a2a38, #0f151f);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: #4ea8de;
    border: 1px solid rgba(78, 168, 222, 0.3);
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  .brand-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.2rem;
    font-weight: 500;
    letter-spacing: -0.3px;
    color: #eef2ff;
  }

  .brand-name span {
    color: #4ea8de;
    font-weight: 600;
  }

  /* typography */
  .card-title {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 500;
    color: #b9c7d4;
    margin-bottom: 1.8rem;
    font-family: 'Inter', sans-serif;
    letter-spacing: -0.2px;
  }

  /* form fields */
  .field {
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #8b9bb0;
    margin-bottom: 0.4rem;
    font-family: 'Inter', sans-serif;
  }

  .input-wrapper {
    position: relative;
  }

  .input-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #5d6f83;
    width: 16px;
    height: 16px;
    pointer-events: none;
  }

  input {
    width: 100%;
    background: #0c1117;
    border: 1px solid #232a33;
    border-radius: 14px;
    padding: 0.75rem 0.75rem 0.75rem 2.4rem;
    font-size: 0.9rem;
    font-family: 'Inter', sans-serif;
    color: #eef2ff;
    transition: all 0.2s;
    outline: none;
  }

  input:focus {
    border-color: #4ea8de;
    background: #0b1016;
    box-shadow: 0 0 0 2px rgba(78, 168, 222, 0.2);
  }

  input::placeholder {
    color: #3f4a5a;
    font-weight: 400;
  }

  .hint {
    font-size: 0.68rem;
    color: #6c7e96;
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -0.2px;
  }

  /* button — clean & solid */
  .btn {
    width: 100%;
    background: #2c6e9e;
    border: none;
    border-radius: 40px;
    padding: 0.8rem;
    font-size: 0.9rem;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    color: white;
    cursor: pointer;
    margin-top: 12px;
    transition: all 0.2s ease;
    background: linear-gradient(135deg, #2c6e9e, #1f547c);
    box-shadow: 0 1px 1px rgba(0,0,0,0.2);
  }

  .btn:hover {
    background: #2c6e9e;
    filter: brightness(1.05);
    transform: translateY(-1px);
    box-shadow: 0 6px 14px rgba(44, 110, 158, 0.25);
  }

  .btn:active {
    transform: translateY(0);
  }

  .btn:disabled {
    opacity: 0.6;
    transform: none;
    cursor: not-allowed;
    filter: none;
  }

  /* divider minimal */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 1.5rem 0 1.2rem;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: #232a33;
  }

  .divider-text {
    font-size: 0.7rem;
    color: #7a8aa0;
    font-family: 'Inter', sans-serif;
    text-transform: uppercase;
  }

  /* switch link */
  .switch {
    text-align: center;
    font-size: 0.85rem;
    color: #9aabbf;
  }

  .switch span {
    color: #4ea8de;
    font-weight: 600;
    cursor: pointer;
    transition: color 0.15s;
    border-bottom: 1px dotted transparent;
  }

  .switch span:hover {
    color: #79c0ff;
    border-bottom-color: #79c0ff;
  }

  /* toast simple */
  #toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: #1e252f;
    backdrop-filter: blur(8px);
    padding: 0.7rem 1.5rem;
    border-radius: 60px;
    font-size: 0.8rem;
    font-weight: 500;
    color: #eef2ff;
    border: 1px solid rgba(78, 168, 222, 0.3);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Inter', sans-serif;
    pointer-events: none;
  }

  #toast.show {
    transform: translateX(-50%) translateY(0);
  }

  .toast-badge {
    width: 8px;
    height: 8px;
    border-radius: 10px;
    background: #4ea8de;
  }

  #toast.success .toast-badge {
    background: #3fb950;
  }

  #toast.error .toast-badge {
    background: #f78166;
  }

  /* loader inline */
  .btn-spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* very subtle background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 20% 40%, rgba(46, 91, 128, 0.08), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 2;
  }

  /* remove any matrix leftovers */
  canvas, .glow-orb, .matrix-bg {
    display: none;
  }

  /* responsive */
  @media (max-width: 480px) {
    .card {
      padding: 1.5rem;
    }
  }
</style>
</head>
<body>

<div id="toast">
  <div class="toast-badge"></div>
  <span id="toast-msg"></span>
</div>

<div class="card">
  <div class="brand">
    <div class="brand-icon"><img src= "img/icon.png"></div>
    <div class="brand-name">open<span>IDE</span></div>
  </div>
  <div class="card-title" id="cardTitle">sign in → workspace</div>

  <div class="field">
    <label for="username">Username</label>
    <div class="input-wrapper">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
      <input type="text" id="username" placeholder="alex / dev_01" autocomplete="username">
    </div>
    <div class="hint">6–12 characters · letters & numbers only</div>
  </div>

  <div class="field">
    <label for="password">Password</label>
    <div class="input-wrapper">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
      </svg>
      <input type="password" id="password" placeholder="········" autocomplete="current-password">
    </div>
  </div>

  <button class="btn" id="actionBtn">Sign in</button>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">access</span>
    <div class="divider-line"></div>
  </div>

  <div class="switch" id="switchContainer">
    <span>New to openIDE?</span> <span id="toggleModeBtn">Create account</span>
  </div>
</div>

<script>
  // ------------------- CONFIG --------------------
  const API_BASE = "https://code-mon.codemon.workers.dev";
  let toastTimeout = null;

  // DOM elements
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const actionBtn = document.getElementById('actionBtn');
  const cardTitle = document.getElementById('cardTitle');
  const switchContainer = document.getElementById('switchContainer');
  const toggleModeSpan = document.getElementById('toggleModeBtn');

  // state
  let isLoginMode = true;   // true = login, false = signup

  // ---------- helper: toast ----------
  function showToast(message, type = 'error') {
    const toastEl = document.getElementById('toast');
    const msgSpan = document.getElementById('toast-msg');
    msgSpan.textContent = message;
    toastEl.className = `show ${type}`;
    if (toastTimeout) clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => {
      toastEl.className = '';
    }, 2800);
  }

  // username validator
  function validateUsername(str) {
    return str && str.length >= 6 && str.length <= 12 && /^[a-zA-Z0-9]+$/.test(str);
  }

  // set loading state for button
  function setLoading(isLoading, originalLabel) {
    if (isLoading) {
      actionBtn.disabled = true;
      actionBtn.innerHTML = `<span class="btn-spinner"></span>${originalLabel}`;
    } else {
      actionBtn.disabled = false;
      actionBtn.innerHTML = originalLabel;
    }
  }

  // get button label based on mode
  function getButtonLabel() {
    return isLoginMode ? 'Sign in' : 'Create account';
  }

  // switch UI to SIGNUP mode
  function switchToSignupUI() {
    isLoginMode = false;
    cardTitle.textContent = 'create profile → openIDE';
    actionBtn.innerHTML = 'Create account';
    // update toggle text
    switchContainer.innerHTML = `<span>Already have an account?</span> <span id="toggleModeBtn">Sign in</span>`;
    // reattach event to new span
    document.getElementById('toggleModeBtn').addEventListener('click', switchToLoginUI);
  }

  // switch UI to LOGIN mode
  function switchToLoginUI() {
    isLoginMode = true;
    cardTitle.textContent = 'sign in → workspace';
    actionBtn.innerHTML = 'Sign in';
    switchContainer.innerHTML = `<span>New to openIDE?</span> <span id="toggleModeBtn">Create account</span>`;
    document.getElementById('toggleModeBtn').addEventListener('click', switchToSignupUI);
  }

  // ---------- LOGIC: login ----------
  async function performLogin() {
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();

    if (!username || !password) {
      showToast("Fill in both fields", "error");
      return false;
    }
    if (!validateUsername(username)) {
      showToast("Username: 6–12 letters/numbers only", "error");
      return false;
    }

    const originalLabel = getButtonLabel();
    setLoading(true, "Signing in...");

    try {
      const url = `${API_BASE}/api/pass?username=${encodeURIComponent(username)}&pass=${encodeURIComponent(password)}`;
      const response = await fetch(url);
      const data = await response.json();

      if (!data.success) {
        setLoading(false, originalLabel);
        showToast(data.error || "Invalid credentials", "error");
        return false;
      }

      // success: store session
      localStorage.setItem("username", username);
      localStorage.setItem("password", password);
      showToast("Access granted · redirecting", "success");
      setTimeout(() => {
        window.location.href = "index.html";
      }, 800);
      return true;
    } catch (err) {
      console.warn(err);
      setLoading(false, originalLabel);
      showToast("Connection error · check network", "error");
      return false;
    }
  }

  // ---------- LOGIC: signup ----------
  async function performSignup() {
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();

    if (!username || !password) {
      showToast("All fields required", "error");
      return false;
    }
    if (!validateUsername(username)) {
      showToast("Username: 6–12 alphanumeric chars", "error");
      return false;
    }

    const originalLabel = getButtonLabel();
    setLoading(true, "Creating...");

    try {
      const url = `${API_BASE}/api/pass-deploy?username=${encodeURIComponent(username)}&pass=${encodeURIComponent(password)}`;
      const response = await fetch(url);
      const data = await response.json();

      if (!data.success) {
        setLoading(false, originalLabel);
        showToast(data.error || "Signup failed (maybe username exists)", "error");
        return false;
      }

      showToast("Account created! You can now sign in", "success");
      setLoading(false, originalLabel);

      // clear fields and switch to login after short delay
      setTimeout(() => {
        usernameInput.value = '';
        passwordInput.value = '';
        switchToLoginUI();
        // ensure focus on username
        usernameInput.focus();
      }, 1200);
      return true;
    } catch (err) {
      setLoading(false, originalLabel);
      showToast("Network error · cannot reach server", "error");
      return false;
    }
  }

  // ---------- main action router ----------
  async function handleMainAction() {
    if (isLoginMode) {
      await performLogin();
    } else {
      await performSignup();
    }
  }

  // ---------- event binding & enter shortcuts ----------
  function bindEvents() {
    actionBtn.addEventListener('click', (e) => {
      e.preventDefault();
      handleMainAction();
    });

    // enter key navigation
    usernameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        passwordInput.focus();
      }
    });

    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleMainAction();
      }
    });
  }

  // initialize UI mode with proper toggles
  function initUI() {
    // default login mode
    isLoginMode = true;
    cardTitle.textContent = 'sign in → workspace';
    actionBtn.innerHTML = 'Sign in';
    switchContainer.innerHTML = `<span>New to openIDE?</span> <span id="toggleModeBtn">Create account</span>`;
    const newToggle = document.getElementById('toggleModeBtn');
    if (newToggle) newToggle.addEventListener('click', switchToSignupUI);
    usernameInput.value = '';
    passwordInput.value = '';
  }

  // also clean any leftover canvas / matrix from old code, but we removed all that.
  // extra: small focus improvements
  function setFocus() {
    usernameInput.focus();
  }

  // start app
  initUI();
  bindEvents();
  setFocus();

  // ensure that after switching mode using dynamic span, the new spans have correct listeners.
  // but we already reattach in switchToLoginUI / switchToSignupUI.
  window.switchToSignupUI = switchToSignupUI;
  window.switchToLoginUI = switchToLoginUI;
  
  // extra handler for any dynamic reference
  document.addEventListener('click', (e) => {
    if (e.target && e.target.id === 'toggleModeBtn') {
      // already covered by listeners, but safe guard
    }
  });
</script>
</body>
</html>
