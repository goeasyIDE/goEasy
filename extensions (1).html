<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extensions — openIDE</title>
<meta name="description" content="Browse and support extensions for openIDE. Discover community-built tools, themes, and language packs.">
<link rel="icon" href="img/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg-deepest:    #060a0f;
  --bg-dark:       #0d1117;
  --bg-card:       #111820;
  --bg-card-hover: #161e29;
  --border:        rgba(99,179,237,0.12);
  --border-bright: rgba(99,179,237,0.3);
  --blue-accent:   #4ea8de;
  --blue-glow:     #2188ff;
  --cyan-accent:   #79c0ff;
  --text-primary:  #e6edf3;
  --text-secondary:#8b949e;
  --text-muted:    #484f58;
  --green-acc:     #3fb950;
  --purple-acc:    #a371f7;
  --orange-acc:    #f78166;
  --yellow-acc:    #e3b341;
  --font-ui:       'Space Grotesk', sans-serif;
  --font-mono:     'JetBrains Mono', monospace;
  --radius-sm:     6px;
  --radius-md:     10px;
  --radius-lg:     16px;
  --radius-xl:     24px;
  --nav-h:         64px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-ui);
  background: var(--bg-deepest);
  color: var(--text-primary);
  overflow-x: hidden;
  line-height: 1.6;
  min-height: 100vh;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1;
  opacity: 0.4;
}

#matrix-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  opacity: 0.03;
  z-index: 0;
}

nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 5%;
  background: rgba(6,10,15,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}
.nav-logo img { width: 30px; height: 30px; border-radius: 6px; }
.nav-logo-fallback {
  display: none;
  width: 30px; height: 30px;
  background: #2188ff;
  border-radius: 6px;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  color: #fff;
}
.nav-logo-text { font-size: 17px; font-weight: 700; color: var(--text-primary); font-family: var(--font-mono); letter-spacing: -0.5px; }
.nav-logo-text span { color: var(--blue-accent); }

.nav-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.nav-link {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  transition: color 0.2s, background 0.2s;
}
.nav-link:hover { color: var(--text-primary); background: rgba(255,255,255,0.06); }

.btn-login {
  display: flex;
  align-items: center;
  gap: 7px;
  background: transparent;
  color: var(--text-primary);
  border: 1px solid var(--border-bright);
  font-family: var(--font-ui);
  font-size: 13.5px;
  font-weight: 600;
  padding: 7px 16px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background 0.2s, transform 0.2s;
}
.btn-login:hover { background: rgba(99,179,237,0.08); transform: translateY(-1px); }

.btn-logout {
  display: flex;
  align-items: center;
  gap: 7px;
  background: rgba(247,129,102,0.1);
  color: var(--orange-acc);
  border: 1px solid rgba(247,129,102,0.25);
  font-family: var(--font-ui);
  font-size: 13.5px;
  font-weight: 600;
  padding: 7px 16px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background 0.2s;
}
.btn-logout:hover { background: rgba(247,129,102,0.18); }

.user-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(33,136,255,0.1);
  border: 1px solid rgba(33,136,255,0.22);
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  color: var(--cyan-accent);
}
.user-dot { width: 7px; height: 7px; background: var(--green-acc); border-radius: 50%; animation: pulse 2s infinite; }

@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.8); } }

.page-wrap {
  position: relative;
  z-index: 2;
  padding-top: calc(var(--nav-h) + 56px);
  padding-bottom: 80px;
  max-width: 1100px;
  margin: 0 auto;
  padding-left: 5%;
  padding-right: 5%;
}

.page-header {
  margin-bottom: 48px;
  animation: fadeUp 0.6s ease both;
}
.page-header h1 {
  font-size: clamp(32px, 5vw, 52px);
  font-weight: 700;
  letter-spacing: -1.5px;
  line-height: 1.1;
  margin-bottom: 12px;
}
.page-header h1 span { color: var(--blue-accent); }
.page-header p { color: var(--text-secondary); font-size: 16px; max-width: 480px; }

.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 36px;
  flex-wrap: wrap;
  animation: fadeUp 0.6s 0.1s ease both;
}

.search-wrap {
  flex: 1;
  min-width: 200px;
  position: relative;
}
.search-wrap svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
}
.search-input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 14.5px;
  padding: 11px 14px 11px 42px;
  outline: none;
  transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { border-color: var(--border-bright); }

.filter-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  padding: 10px 16px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s, background 0.2s;
  white-space: nowrap;
}
.filter-btn:hover, .filter-btn.active {
  color: var(--blue-accent);
  border-color: rgba(78,168,222,0.4);
  background: rgba(78,168,222,0.07);
}

.ext-count {
  font-size: 13px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  white-space: nowrap;
}

.ext-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 18px;
}

.ext-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px;
  display: flex;
  flex-direction: column;
  gap: 0;
  transition: border-color 0.25s, transform 0.25s, background 0.25s;
  animation: fadeUp 0.5s ease both;
  position: relative;
  overflow: hidden;
}
.ext-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--blue-accent), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.ext-card:hover::before { opacity: 1; }
.ext-card:hover {
  border-color: var(--border-bright);
  transform: translateY(-3px);
  background: var(--bg-card-hover);
}

.ext-header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 14px;
}

.ext-img-wrap {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-md);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}
.ext-img-wrap img { width: 32px; height: 32px; object-fit: contain; }
.ext-img-fallback {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--blue-glow);
  display: none;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  color: #fff;
}

.ext-meta { flex: 1; min-width: 0; }
.ext-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.3px;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ext-author {
  font-size: 12.5px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}
.ext-author span { color: var(--blue-accent); }

.ext-type-badge {
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font-mono);
  padding: 3px 9px;
  border-radius: 999px;
  background: rgba(163,113,247,0.12);
  color: var(--purple-acc);
  border: 1px solid rgba(163,113,247,0.2);
  white-space: nowrap;
  align-self: flex-start;
  margin-top: 2px;
}

.ext-desc {
  font-size: 13.5px;
  color: var(--text-secondary);
  line-height: 1.65;
  margin-bottom: 18px;
  flex: 1;
}
.ext-desc p { margin: 0; }
.ext-desc strong { color: var(--text-primary); font-weight: 600; }
.ext-desc code {
  background: rgba(255,255,255,0.07);
  padding: 1px 5px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--cyan-accent);
}

.ext-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.ext-id {
  font-size: 11.5px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  letter-spacing: 0.3px;
}

.star-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: var(--font-ui);
  font-size: 13.5px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.star-btn:hover {
  border-color: rgba(227,179,65,0.45);
  color: var(--yellow-acc);
  background: rgba(227,179,65,0.07);
}
.star-btn.starred {
  border-color: rgba(227,179,65,0.45);
  color: var(--yellow-acc);
  background: rgba(227,179,65,0.1);
}
.star-btn svg { transition: transform 0.2s; }
.star-btn:hover svg { transform: scale(1.15); }
.star-btn.loading { opacity: 0.6; pointer-events: none; }

.star-spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(227,179,65,0.3);
  border-top-color: var(--yellow-acc);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.skeleton {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px;
}
.skel-line {
  background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 6px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

.empty-state {
  grid-column: 1/-1;
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
}
.empty-state svg { margin-bottom: 16px; opacity: 0.3; }
.empty-state p { font-size: 15px; }

.error-banner {
  background: rgba(247,129,102,0.08);
  border: 1px solid rgba(247,129,102,0.2);
  border-radius: var(--radius-md);
  color: var(--orange-acc);
  font-size: 14px;
  padding: 14px 18px;
  margin-bottom: 24px;
  display: none;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-xl);
  padding: 36px 32px;
  width: 100%;
  max-width: 400px;
  animation: slideUp 0.25s ease;
  position: relative;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

.modal h2 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.modal-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }

.field { margin-bottom: 18px; }
.field label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 7px; letter-spacing: 0.3px; }
.field input {
  width: 100%;
  background: var(--bg-dark);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 14.5px;
  padding: 11px 14px;
  outline: none;
  transition: border-color 0.2s;
}
.field input::placeholder { color: var(--text-muted); }
.field input:focus { border-color: var(--border-bright); }

.modal-error {
  background: rgba(247,129,102,0.08);
  border: 1px solid rgba(247,129,102,0.2);
  border-radius: var(--radius-sm);
  color: var(--orange-acc);
  font-size: 13px;
  padding: 10px 14px;
  margin-bottom: 18px;
  display: none;
}

.btn-confirm {
  width: 100%;
  background: var(--blue-glow);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  font-family: var(--font-ui);
  font-size: 15px;
  font-weight: 600;
  padding: 13px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
  margin-bottom: 10px;
}
.btn-confirm:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-confirm:disabled { opacity: 0.5; pointer-events: none; }

.btn-cancel {
  width: 100%;
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 500;
  padding: 11px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-cancel:hover { background: rgba(255,255,255,0.04); }

.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  transition: color 0.2s, background 0.2s;
}
.modal-close:hover { color: var(--text-primary); background: rgba(255,255,255,0.06); }

.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg-card);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-xl);
  padding: 12px 22px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  z-index: 300;
  transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
  opacity: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.success { border-color: rgba(63,185,80,0.4); }
.toast.error { border-color: rgba(247,129,102,0.4); }
.toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.toast.success .toast-dot { background: var(--green-acc); }
.toast.error .toast-dot { background: var(--orange-acc); }

@keyframes fadeUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

footer {
  position: relative;
  z-index: 2;
  padding: 36px 5%;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}
.footer-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.footer-logo img { width: 24px; height: 24px; border-radius: 5px; }
.footer-logo-text { font-family: var(--font-mono); font-weight: 700; font-size: 14px; color: var(--text-primary); }
.footer-logo-text span { color: var(--blue-accent); }
.footer-copy { font-size: 12.5px; color: var(--text-muted); }

@media (max-width: 640px) {
  .toolbar { gap: 8px; }
  .filter-btn span { display: none; }
  .ext-grid { grid-template-columns: 1fr; }
  nav { padding: 0 4%; }
  .page-wrap { padding-left: 4%; padding-right: 4%; }
}
</style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="img/icon.png" alt="openIDE"
      onerror="this.style.display='none';document.querySelector('.nav-logo-fallback').style.display='flex'">
    <div class="nav-logo-fallback">O</div>
    <span class="nav-logo-text">open<span>IDE</span></span>
  </a>
  <div class="nav-right">
    <a href="index.html" class="nav-link">← Home</a>
    <a href="openIDE" class="nav-link">Editor</a>
    <div id="auth-area"></div>
  </div>
</nav>

<div class="page-wrap">

  <div class="page-header">
    <h1>Extension <span>Marketplace</span></h1>
    <p>Discover and support community-built extensions for openIDE. Click ★ to star your favourites.</p>
  </div>

  <div id="error-banner" class="error-banner"></div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" class="search-input" id="search-input" placeholder="Search extensions…">
    </div>
    <button class="filter-btn active" data-filter="all"><span>All </span>Types</button>
    <button class="filter-btn" data-filter="terminal"><span>Terminal</span></button>
    <button class="filter-btn" data-filter="iframe"><span>iFrame</span></button>
    <span class="ext-count" id="ext-count"></span>
  </div>

  <div class="ext-grid" id="ext-grid">
    <div class="skeleton">
      <div style="display:flex;gap:14px;margin-bottom:14px"><div class="skel-line" style="width:48px;height:48px;border-radius:10px;flex-shrink:0"></div><div style="flex:1"><div class="skel-line" style="height:16px;width:60%;margin-bottom:8px"></div><div class="skel-line" style="height:12px;width:35%"></div></div></div>
      <div class="skel-line" style="height:12px;width:100%;margin-bottom:6px"></div>
      <div class="skel-line" style="height:12px;width:75%"></div>
    </div>
    <div class="skeleton">
      <div style="display:flex;gap:14px;margin-bottom:14px"><div class="skel-line" style="width:48px;height:48px;border-radius:10px;flex-shrink:0"></div><div style="flex:1"><div class="skel-line" style="height:16px;width:70%;margin-bottom:8px"></div><div class="skel-line" style="height:12px;width:40%"></div></div></div>
      <div class="skel-line" style="height:12px;width:100%;margin-bottom:6px"></div>
      <div class="skel-line" style="height:12px;width:55%"></div>
    </div>
    <div class="skeleton">
      <div style="display:flex;gap:14px;margin-bottom:14px"><div class="skel-line" style="width:48px;height:48px;border-radius:10px;flex-shrink:0"></div><div style="flex:1"><div class="skel-line" style="height:16px;width:50%;margin-bottom:8px"></div><div class="skel-line" style="height:12px;width:30%"></div></div></div>
      <div class="skel-line" style="height:12px;width:100%;margin-bottom:6px"></div>
      <div class="skel-line" style="height:12px;width:85%"></div>
    </div>
  </div>

</div>

<footer>
  <a href="index.html" class="footer-logo">
    <img src="img/icon.png" alt="openIDE"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div style="display:none;width:24px;height:24px;background:#2188ff;border-radius:5px;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;font-weight:700;color:#fff">O</div>
    <span class="footer-logo-text">open<span>IDE</span></span>
  </a>
  <span class="footer-copy">&copy; 2025 openIDE &middot; Open Source</span>
</footer>

<div class="modal-overlay" id="login-modal">
  <div class="modal">
    <button class="modal-close" id="modal-close-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <h2>Sign in to Star</h2>
    <p class="modal-sub">Enter your openIDE account credentials to like extensions.</p>
    <div class="modal-error" id="modal-error"></div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="login-username" placeholder="your_username" autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-confirm" id="login-submit-btn">Sign In</button>
    <button class="btn-cancel" id="modal-cancel-btn">Cancel</button>
  </div>
</div>

<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toast-msg"></span>
</div>

<script>
const API = 'https://code-mon.codemon.workers.dev';

let allExtensions = [];
let currentFilter = 'all';
let searchQuery = '';
let pendingLikeId = null;
let session = null;

function getSession() {
  try {
    const username = localStorage.getItem('username');
    const password = localStorage.getItem('password');
    if (username && password) return { username, password };
    return null;
  } catch { return null; }
}
function saveSession(data) {
  session = data;
}
function clearSession() {
  session = null;
}

function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  const msgEl = document.getElementById('toast-msg');
  el.className = 'toast ' + type;
  msgEl.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function renderAuthArea() {
  const area = document.getElementById('auth-area');
  if (session) {
    area.innerHTML = `
      <div class="user-chip"><div class="user-dot"></div>${session.username}</div>
      <button class="btn-logout" id="logout-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>`;
    document.getElementById('logout-btn').addEventListener('click', () => {
      clearSession();
      renderAuthArea();
      renderCards(filterExtensions());
      showToast('Signed out', 'success');
    });
  } else {
    area.innerHTML = '';
  }
}

function openModal(extId) {
  pendingLikeId = extId;
  document.getElementById('login-modal').classList.add('open');
  document.getElementById('modal-error').style.display = 'none';
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  setTimeout(() => document.getElementById('login-username').focus(), 100);
}

function closeModal() {
  document.getElementById('login-modal').classList.remove('open');
  pendingLikeId = null;
}

document.getElementById('modal-close-btn').addEventListener('click', closeModal);
document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
document.getElementById('login-modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('login-modal')) closeModal();
});

document.getElementById('login-submit-btn').addEventListener('click', async () => {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('modal-error');
  const btn = document.getElementById('login-submit-btn');

  if (!username || !password) {
    errEl.textContent = 'Please enter both username and password.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  errEl.style.display = 'none';

  if (pendingLikeId) {
    const result = await likeExtension(username, password, pendingLikeId);
    if (result.success) {
      saveSession({ username, password });
      closeModal();
      renderAuthArea();
      const ext = allExtensions.find(e => e.id === pendingLikeId);
      if (ext) {
        if (!Array.isArray(ext.stars)) ext.stars = [];
        if (!ext.stars.includes(username)) ext.stars.push(username);
      }
      renderCards(filterExtensions());
      showToast('★ Starred successfully!', 'success');
    } else {
      errEl.textContent = result.error || 'Invalid credentials.';
      errEl.style.display = 'block';
    }
  } else {
    const testResult = await verifyCredentials(username, password);
    if (testResult.ok) {
      saveSession({ username, password });
      closeModal();
      renderAuthArea();
      renderCards(filterExtensions());
      showToast('Signed in as ' + username, 'success');
    } else {
      errEl.textContent = testResult.error || 'Invalid credentials.';
      errEl.style.display = 'block';
    }
  }

  btn.disabled = false;
  btn.textContent = 'Sign In';
});

document.getElementById('login-username').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('login-password').focus();
});
document.getElementById('login-password').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('login-submit-btn').click();
});

async function verifyCredentials(username, password) {
  try {
    const res = await fetch(`${API}/openIDE/likes`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, id: '__verify__' })
    });
    const data = await res.json();
    if (res.status === 403) return { ok: false, error: 'Incorrect password.' };
    if (res.status === 404 && data.error === 'Username not found') return { ok: false, error: 'Username not found.' };
    return { ok: true };
  } catch {
    return { ok: false, error: 'Network error. Please try again.' };
  }
}

async function likeExtension(username, password, id) {
  try {
    const res = await fetch(`${API}/openIDE/likes`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, id })
    });
    const data = await res.json();
    if (!res.ok) return { success: false, error: data.error || 'Request failed.' };
    if (data.success === false) return { success: false, error: data.message || 'Already liked.' };
    return { success: true };
  } catch {
    return { success: false, error: 'Network error. Please try again.' };
  }
}

async function fetchExtensions() {
  try {
    const res = await fetch(`${API}/openIDE/extensions`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } catch (e) {
    const banner = document.getElementById('error-banner');
    banner.textContent = 'Failed to load extensions. Please check your connection and refresh.';
    banner.style.display = 'block';
    return [];
  }
}

function filterExtensions() {
  return allExtensions.filter(ext => {
    const matchType = currentFilter === 'all' || (ext.type || '').toLowerCase() === currentFilter;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q ||
      (ext.name || '').toLowerCase().includes(q) ||
      (ext.description || '').toLowerCase().includes(q) ||
      (ext.author || '').toLowerCase().includes(q);
    return matchType && matchSearch;
  });
}

function isStarred(ext) {
  if (!session) return false;
  return Array.isArray(ext.stars) && ext.stars.includes(session.username);
}

function starCount(ext) {
  return Array.isArray(ext.stars) ? ext.stars.length : 0;
}

function renderCards(list) {
  const grid = document.getElementById('ext-grid');
  const countEl = document.getElementById('ext-count');
  countEl.textContent = list.length + ' extension' + (list.length !== 1 ? 's' : '');

  if (list.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <p>No extensions found.</p>
      </div>`;
    return;
  }

  grid.innerHTML = list.map((ext, i) => {
    const starred = isStarred(ext);
    const count = starCount(ext);
    const desc = marked.parse(ext.description || '');
    const typeBadge = ext.type ? `<span class="ext-type-badge">${ext.type}</span>` : '';
    return `
      <div class="ext-card" style="animation-delay:${i * 0.06}s">
        <div class="ext-header">
          <div class="ext-img-wrap">
            <img src="${ext.img || ''}" alt="${ext.name || ''}"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="ext-img-fallback">${(ext.name || 'E').slice(0,2).toUpperCase()}</div>
          </div>
          <div class="ext-meta">
            <div class="ext-name">${ext.name || 'Untitled'}</div>
            <div class="ext-author">by <span>${ext.author || 'unknown'}</span></div>
          </div>
          ${typeBadge}
        </div>
        <div class="ext-desc">${desc}</div>
        <div class="ext-footer">
          <span class="ext-id">${ext.id || ''}</span>
          <button class="star-btn ${starred ? 'starred' : ''}" data-id="${ext.id}" data-starred="${starred}">
            <svg width="14" height="14" viewBox="0 0 24 24"
              fill="${starred ? 'currentColor' : 'none'}"
              stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            ${count}
          </button>
        </div>
      </div>`;
  }).join('');

  grid.querySelectorAll('.star-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      const alreadyStarred = btn.dataset.starred === 'true';

      if (alreadyStarred) {
        showToast('You already starred this extension.', 'error');
        return;
      }

      if (!session) {
        showToast('Sign in to openIDE to star extensions.', 'error');
        return;
      }

      btn.classList.add('loading');
      btn.innerHTML = '<div class="star-spinner"></div>';

      const result = await likeExtension(session.username, session.password, id);

      if (result.success) {
        const ext = allExtensions.find(e => e.id === id);
        if (ext) {
          if (!Array.isArray(ext.stars)) ext.stars = [];
          if (!ext.stars.includes(session.username)) ext.stars.push(session.username);
        }
        renderCards(filterExtensions());
        showToast('★ Starred!', 'success');
      } else {
        btn.classList.remove('loading');
        const starred2 = isStarred(allExtensions.find(e => e.id === id));
        const count2 = starCount(allExtensions.find(e => e.id === id) || { stars: [] });
        btn.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="${starred2 ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>${count2}`;
        btn.dataset.starred = starred2;
        if (result.error === 'Already liked.' || result.error === 'Already liked') {
          showToast('You already starred this.', 'error');
        } else if (result.error && result.error.toLowerCase().includes('password')) {
          clearSession();
          session = null;
          renderAuthArea();
          openModal(id);
        } else {
          showToast(result.error || 'Something went wrong.', 'error');
        }
      }
    });
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderCards(filterExtensions());
  });
});

document.getElementById('search-input').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  renderCards(filterExtensions());
});

(function() {
  const canvas = document.getElementById('matrix-canvas');
  const ctx = canvas.getContext('2d');
  let cols, drops;
  const chars = '01{}[]()=>const let var function class';
  function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    cols = Math.floor(canvas.width / 16);
    drops = Array(cols).fill(1).map(() => Math.random() * -canvas.height / 16);
  }
  function draw() {
    ctx.fillStyle = 'rgba(6,10,15,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#4ea8de';
    ctx.font = '13px JetBrains Mono, monospace';
    for (let i = 0; i < cols; i++) {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(ch, i * 16, drops[i] * 16);
      if (drops[i] * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }
  init();
  setInterval(draw, 55);
  window.addEventListener('resize', init);
})();

(async function init() {
  session = getSession();
  renderAuthArea();
  allExtensions = await fetchExtensions();
  renderCards(filterExtensions());
})();
</script>
</body>
