<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>openIDE GitHub Extension</title>
<style>
  body { font-family: monospace; background: #1e1e1e; color: #f5f5f5; margin: 0; padding: 20px; }
  button { font-family: monospace; font-size: 14px; padding: 8px 12px; margin: 5px; cursor: pointer; background: #2e2e2e; color: #f5f5f5; border: none; border-radius: 4px; }
  button:hover { background: #444; }
  #log { margin-top: 20px; white-space: pre-wrap; max-height: 60vh; overflow-y: auto; background: #1b1b1b; padding: 10px; border-radius: 5px; }
</style>
</head>
<body>

<h2>openIDE GitHub Client</h2>
<button id="cloneBtn">Clone GitHub Repo</button>
<button id="pushBtn">Commit & Push</button>
<div id="log"></div>

<script>
(async function() {
  const logEl = document.getElementById('log');
  const params = new URLSearchParams(window.location.search);
  const password = params.get('pass');
  const ip = params.get('ip');

  if(!password || !ip) {
    logEl.textContent = "[Error] Password and IP must be provided in query params, e.g. ?pass=XXX&ip=YYY";
    return;
  }

  function log(msg) {
    logEl.textContent += msg + "\n";
    logEl.scrollTop = logEl.scrollHeight;
  }

  function sendCommand(cmd) {
    parent.postMessage({ type: 'extension-command', command: cmd, password }, '*');
    log("> " + cmd);
  }

  document.getElementById('cloneBtn').addEventListener('click', () => {
    const lastRepo = localStorage.getItem('openIDE_lastRepo') || '';
    const repo = prompt("Enter GitHub repo URL to clone:", lastRepo);
    if(repo) {
      localStorage.setItem('openIDE_lastRepo', repo);
      sendCommand(`git clone ${repo}`);
    }
  });

  document.getElementById('pushBtn').addEventListener('click', () => {
    const lastMsg = localStorage.getItem('openIDE_lastCommit') || '';
    const msg = prompt("Enter commit message:", lastMsg);
    if(!msg) return;
    localStorage.setItem('openIDE_lastCommit', msg);
    sendCommand(`git add .`);
    sendCommand(`git commit -m "${msg}"`);
    sendCommand(`git push`);
  });

  log("[GitHub Client Loaded]");
  log("Use the buttons above to clone or push repos.");
})();
</script>

</body>
</html>
