<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>openIDE GitHub Client</title>
<style>
  body { font-family: monospace; background: #1e1e1e; color: #f5f5f5; margin: 0; padding: 0; }
  #terminal { height: 100vh; width: 100%; padding: 10px; box-sizing: border-box; overflow-y: auto; background: #1e1e1e; }
  input { width: 100%; box-sizing: border-box; font-family: monospace; font-size: 14px; background: #2e2e2e; border: none; color: #f5f5f5; padding: 5px; margin-top: 2px; }
  .output { white-space: pre-wrap; margin: 2px 0; }
  .prompt { color: #0af; }
</style>
</head>
<body>
<div id="terminal"></div>
<input id="cmdInput" placeholder="Type command..." autocomplete="off" />
<script>
(async function() {
  const term = document.getElementById('terminal');
  const input = document.getElementById('cmdInput');

  const params = new URLSearchParams(window.location.search);
  const password = params.get('pass');
  const ip = params.get('ip');

  if(!password || !ip) {
    term.innerHTML = "[Error] Password and IP must be provided in query params, e.g. ?pass=XXX&ip=YYY";
    return;
  }

  const ws = new WebSocket(`ws://${ip}/`);
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if(msg.type === 'stdout' || msg.type === 'stderr' || msg.type === 'run-stdout' || msg.type === 'run-stderr') {
        appendOutput(msg.data);
      }
    } catch(err) { console.log(err); }
  };

  function sendCommand(cmd) {
    ws.send(JSON.stringify({ type: 'command', command: cmd, password }));
  }

  function appendOutput(text) {
    term.innerHTML += `<div class="output">${text}</div>`;
    term.scrollTop = term.scrollHeight;
  }

  function gitClone() {
    const lastRepo = localStorage.getItem('openIDE_lastRepo') || '';
    const repo = prompt("Enter GitHub repo URL to clone:", lastRepo);
    if(repo) {
      localStorage.setItem('openIDE_lastRepo', repo);
      sendCommand(`git clone ${repo}`);
    }
  }

  function gitCommitPush() {
    const lastMsg = localStorage.getItem('openIDE_lastCommit') || '';
    const msg = prompt("Enter commit message:", lastMsg);
    if(!msg) return;
    localStorage.setItem('openIDE_lastCommit', msg);
    sendCommand(`git add .`);
    sendCommand(`git commit -m "${msg}"`);
    sendCommand(`git push`);
  }

  input.addEventListener('keydown', e => {
    if(e.key === 'Enter') {
      const cmd = input.value.trim();
      input.value = '';
      if(cmd === 'git-clone') gitClone();
      else if(cmd === 'git-push') gitCommitPush();
      else sendCommand(cmd);
      appendOutput(`<span class="prompt">> ${cmd}</span>`);
    }
  });
})();
</script>
</body>
</html>
