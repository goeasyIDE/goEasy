<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Extension Manager</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0f14;--sb:#13141a;--ab:#0b0c10;
  --accent:#7c6af7;--adim:rgba(124,106,247,.14);
  --text:#dde1f0;--muted:#5e6479;--border:#1e2030;
  --hover:#181924;--red:#f87171;--green:#34d399;
  --accent2:#a78bfa;--accent-glow:rgba(124,106,247,.25);
  --ui:'Inter',system-ui,sans-serif;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--ui);overflow:hidden}

#setup-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.88);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center}
#setup-overlay.hide{display:none}
.s-card{background:var(--sb);border:1px solid var(--border);border-radius:18px;padding:40px;width:440px;box-shadow:0 0 80px var(--accent-glow),0 40px 80px rgba(0,0,0,.7)}
.s-logo{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.s-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 4px 20px var(--accent-glow)}
.s-title{font-size:22px;font-weight:700;letter-spacing:-.5px}
.s-title span{color:var(--accent)}
.s-sub{font-size:12.5px;color:var(--muted);margin-bottom:22px;line-height:1.75}
.s-field{margin-bottom:14px}
.s-field label{display:block;font-size:10.5px;font-weight:600;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.8px}
.s-field input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:monospace;font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s}
.s-field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.s-field input::placeholder{color:var(--muted)}
.s-err{font-size:11.5px;color:var(--red);margin-top:8px;display:none;padding:8px 12px;background:rgba(248,113,113,.08);border-radius:6px;border:1px solid rgba(248,113,113,.2)}
.s-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:9px;color:#fff;font-size:13.5px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;box-shadow:0 4px 18px var(--accent-glow);margin-top:6px}
.s-btn:hover{opacity:.9}.s-btn:active{transform:scale(.98)}

#app{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden}
#app.hide{display:none}

#topbar{height:50px;background:var(--ab);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.tb-logo{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.5px;display:flex;align-items:center;gap:8px;white-space:nowrap}
.tb-dot{width:8px;height:8px;border-radius:50%;background:var(--red);transition:background .3s;flex-shrink:0}
.tb-dot.on{background:var(--green)}
.tb-host{font-size:11px;color:var(--muted);font-family:monospace;padding:2px 8px;background:var(--hover);border-radius:5px;border:1px solid var(--border)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-btn{height:28px;padding:0 12px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;font-family:var(--ui)}
.tb-btn:hover{color:var(--text);background:var(--hover)}

#ctrl-bar{padding:12px 16px;background:var(--sb);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}

.dd-wrap{position:relative;flex:1;min-width:280px;max-width:480px}
#dd-btn{width:100%;padding:9px 14px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:border-color .2s;user-select:none}
#dd-btn:hover,#dd-btn.open{border-color:var(--accent)}
#dd-btn .dd-arrow{margin-left:auto;font-size:10px;color:var(--muted);transition:transform .2s}
#dd-btn.open .dd-arrow{transform:rotate(180deg)}
#dd-placeholder{color:var(--muted);flex:1;font-size:13px;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}

#dd-panel{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--sb);border:1px solid var(--border);border-radius:11px;box-shadow:0 14px 50px rgba(0,0,0,.55);z-index:500;display:none;overflow:hidden;max-height:340px;flex-direction:column}
#dd-panel.open{display:flex}
#dd-search-wrap{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
#dd-search{width:100%;padding:7px 11px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;outline:none;font-family:var(--ui);transition:border-color .2s}
#dd-search:focus{border-color:var(--accent)}
#dd-search::placeholder{color:var(--muted)}
#dd-list{overflow-y:auto;flex:1}
#dd-list::-webkit-scrollbar{width:4px}
#dd-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.dd-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;transition:background .1s;user-select:none}
.dd-item:hover{background:var(--hover)}
.dd-item.selected{background:var(--adim)}
.dd-item img{width:24px;height:24px;border-radius:5px;object-fit:contain;flex-shrink:0}
.dd-item .di-name{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dd-item .di-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:10px}
.dd-item.selected .di-check{background:var(--accent);border-color:var(--accent);color:#fff}
.dd-empty{padding:20px;font-size:12px;color:var(--muted);text-align:center}

#pills-row{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 10px;background:var(--sb);border-bottom:1px solid var(--border);min-height:0;transition:padding .2s}
#pills-row:empty{padding:0;border:none}
.pill{display:flex;align-items:center;gap:6px;padding:4px 8px 4px 6px;background:var(--adim);border:1px solid rgba(124,106,247,.25);border-radius:20px;font-size:11.5px;cursor:pointer;transition:background .15s}
.pill:hover{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3)}
.pill img{width:16px;height:16px;border-radius:3px;object-fit:contain}
.pill span{color:var(--text)}
.pill .px{color:var(--red);font-size:13px;line-height:1;margin-left:2px}

#open-btn{padding:9px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:9px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;box-shadow:0 3px 14px var(--accent-glow);transition:opacity .2s,transform .1s}
#open-btn:hover{opacity:.9}#open-btn:active{transform:scale(.97)}
#open-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

#count-badge{font-size:11px;padding:2px 8px;background:var(--adim);color:var(--accent);border:1px solid rgba(124,106,247,.25);border-radius:10px;white-space:nowrap}

#frames-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:0}
#frames-area::-webkit-scrollbar{width:6px}
#frames-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#frames-area::-webkit-scrollbar-thumb:hover{background:#2e3048}

.ext-block{position:relative;border-bottom:1px solid var(--border);background:var(--bg)}
.ext-header{height:38px;background:var(--ab);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;user-select:none;position:sticky;top:0;z-index:10}
.ext-header img{width:20px;height:20px;border-radius:4px;object-fit:contain}
.ext-title{font-size:12.5px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ext-id{font-size:10.5px;color:var(--muted);font-family:monospace}
.ext-close{width:24px;height:24px;background:none;border:none;color:var(--muted);cursor:pointer;border-radius:5px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:16px;flex-shrink:0}
.ext-close:hover{color:var(--red);background:rgba(248,113,113,.1)}
.ext-iframe-wrap{width:100%;height:600px;position:relative}
.ext-iframe-wrap iframe{width:100%;height:100%;border:none;display:block;background:#fff}
.ext-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);font-size:12px;color:var(--muted);gap:10px;pointer-events:none;transition:opacity .3s}
.ext-loading.gone{opacity:0}
.spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--muted);padding:40px;text-align:center}
#empty-state .big{font-size:52px;opacity:.15}
#empty-state p{font-size:13.5px;line-height:1.7;max-width:320px}
#empty-state .hint{font-size:12px;opacity:.6}

#notifs{position:fixed;bottom:20px;right:20px;z-index:9998;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.notif{padding:10px 14px;background:var(--sb);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;font-size:12px;box-shadow:0 6px 24px rgba(0,0,0,.4);animation:ni .2s ease;max-width:300px;line-height:1.4}
.notif.ok{border-left-color:var(--green)}
.notif.err{border-left-color:var(--red)}
@keyframes ni{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

.dd-skel{padding:9px 12px;display:flex;align-items:center;gap:10px}
.sk-box{background:linear-gradient(90deg,var(--hover) 25%,#1c1e2c 50%,var(--hover) 75%);background-size:200%;animation:sk 1.2s infinite;border-radius:5px}
@keyframes sk{0%{background-position:200%}100%{background-position:-200%}}
.resize-handle{width:100%;height:10px;background:transparent;cursor:ns-resize;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:none;user-select:none;transition:background .15s}
.resize-handle:hover{background:var(--adim)}
.resize-handle::after{content:'';width:36px;height:3px;border-radius:2px;background:var(--border);transition:background .15s}
.resize-handle:hover::after,.resize-handle.dragging::after{background:var(--accent)}
.resize-handle.dragging{background:var(--adim)}
</style>
</head>
<body>

<div id="setup-overlay">
  <div class="s-card">
    <div class="s-logo">
      <div class="s-icon">🧩</div>
      <div class="s-title"><span>Ext</span>Manager</div>
    </div>
    <p class="s-sub">Connect to your openIDE server to browse and launch installed extensions inside iframes.</p>
    <div class="s-field">
      <label>Host / IP</label>
      <input id="cfg-host" type="text" placeholder="localhost or 192.168.x.x" autocomplete="off"/>
    </div>
    <div class="s-field">
      <label>Password</label>
      <input id="cfg-pass" type="password" placeholder="Server password" autocomplete="off"/>
    </div>
    <div class="s-err" id="s-err"></div>
    <button class="s-btn" id="connect-btn">Connect →</button>
  </div>
</div>

<div id="app" class="hide">

  
  <div id="topbar">
    <div class="tb-logo">
      <span>🧩</span> ExtManager
    </div>
    <div class="tb-dot" id="ws-dot"></div>
    <div class="tb-host" id="tb-host"></div>
    <div class="tb-right">
      <button class="tb-btn" id="btn-disc">Disconnect</button>
    </div>
  </div>

  
  <div id="ctrl-bar">
    <div class="dd-wrap" id="dd-wrap">
      <div id="dd-btn">
        <span>🧩</span>
        <span id="dd-placeholder">Select extensions to open…</span>
        <span class="dd-arrow">▼</span>
      </div>
      <div id="dd-panel">
        <div id="dd-search-wrap">
          <input id="dd-search" type="text" placeholder="Search extensions…" autocomplete="off"/>
        </div>
        <div id="dd-list">
          <div class="dd-skel">
            <div class="sk-box" style="width:24px;height:24px;border-radius:5px;flex-shrink:0"></div>
            <div class="sk-box" style="flex:1;height:14px"></div>
          </div>
          <div class="dd-skel">
            <div class="sk-box" style="width:24px;height:24px;border-radius:5px;flex-shrink:0"></div>
            <div class="sk-box" style="flex:1;height:14px"></div>
          </div>
          <div class="dd-skel">
            <div class="sk-box" style="width:24px;height:24px;border-radius:5px;flex-shrink:0"></div>
            <div class="sk-box" style="flex:1;height:14px"></div>
          </div>
        </div>
      </div>
    </div>

    <span id="count-badge" style="display:none">0 / 10</span>
    <button id="open-btn" disabled>Open Selected</button>
  </div>

  
  <div id="pills-row"></div>

  
  <div id="frames-area">
    <div id="empty-state">
      <div class="big">🧩</div>
      <p>Select extensions from the dropdown above and click <strong>Open Selected</strong> to view them here.</p>
      <p class="hint">You can open up to 10 extensions at a time.</p>
    </div>
  </div>
</div>

<div id="notifs"></div>

<script>
const MAX_OPEN = 10;
let ws = null, HOST = '', PASS = '';
let allExts = [];
let selectedIds = new Set();
let openBlocks = [];

function notify(msg, type=''){
  const a = document.getElementById('notifs');
  const el = document.createElement('div');
  el.className = 'notif' + (type ? ' '+type : '');
  el.textContent = msg;
  a.appendChild(el);
  setTimeout(()=>{
    el.style.transition = 'opacity .3s,transform .3s';
    el.style.opacity = '0'; el.style.transform = 'translateX(20px)';
    setTimeout(()=>el.remove(), 300);
  }, 3000);
}

function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

function defaultIcon(){
  return 'data:image/svg+xml,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><rect width="24" height="24" fill="#13141a" rx="5"/><text x="12" y="17" text-anchor="middle" fill="#7c6af7" font-size="14">⬡</text></svg>'
  );
}

function connectWS(){
  try{
    ws = new WebSocket(`ws://${HOST}:3000`);
    ws.onopen = ()=>{
      document.getElementById('ws-dot').classList.add('on');
      wsSend({type:'extension-load'});
      notify('Connected','ok');
    };
    ws.onclose = ()=>{
      document.getElementById('ws-dot').classList.remove('on');
      notify('Disconnected — retrying in 3s…');
      setTimeout(connectWS, 3000);
    };
    ws.onerror = ()=> notify('WebSocket error','err');
    ws.onmessage = e=>{
      try{ handleWS(JSON.parse(e.data)); }catch(err){ console.warn('WS parse err',err); }
    };
  }catch(e){ notify('Could not connect: '+e.message,'err'); }
}

function wsSend(obj){
  if(ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({...obj, password: PASS}));
}

function handleWS(msg){
  if(msg.type === 'extension-loaded'){
    allExts = (msg.extensions || []).map(e => ({
      id: e.id,
      name: e.name || e.id,
      img: e.img || e.icon || '',
      type: e.type || '',
      url: e.url || ''
    }));
    renderDropdown();
  }
}

document.getElementById('connect-btn').addEventListener('click', ()=>{
  const h = document.getElementById('cfg-host').value.trim();
  const p = document.getElementById('cfg-pass').value.trim();
  const err = document.getElementById('s-err');
  if(!h || !p){ err.textContent='Both fields are required.'; err.style.display='block'; return; }
  err.style.display='none';
  HOST = h; PASS = p;
  localStorage.setItem('em_host', HOST);
  localStorage.setItem('em_pass', PASS);
  document.getElementById('setup-overlay').classList.add('hide');
  document.getElementById('app').classList.remove('hide');
  document.getElementById('tb-host').textContent = HOST;
  connectWS();
});

document.getElementById('btn-disc').addEventListener('click', ()=>{
  if(!confirm('Disconnect and clear credentials?')) return;
  localStorage.removeItem('em_host');
  localStorage.removeItem('em_pass');
  if(ws) ws.close();
  location.reload();
});

(()=>{
  const params = new URLSearchParams(window.location.search);
  const qh = params.get('ip') || params.get('host');
  const qp = params.get('pass') || params.get('password');
  if(qh) document.getElementById('cfg-host').value = qh;
  if(qp) document.getElementById('cfg-pass').value = qp;
})();

['cfg-host','cfg-pass'].forEach(id=>{
  document.getElementById(id).addEventListener('keydown', e=>{
    if(e.key==='Enter') document.getElementById('connect-btn').click();
  });
});

const ddBtn = document.getElementById('dd-btn');
const ddPanel = document.getElementById('dd-panel');
const ddSearch = document.getElementById('dd-search');
const ddList = document.getElementById('dd-list');

ddBtn.addEventListener('click', e=>{
  e.stopPropagation();
  const isOpen = ddPanel.classList.contains('open');
  if(isOpen){ closeDropdown(); } else { openDropdown(); }
});

function openDropdown(){
  ddBtn.classList.add('open');
  ddPanel.classList.add('open');
  ddSearch.value = '';
  renderDropdown();
  setTimeout(()=>ddSearch.focus(), 50);
}

function closeDropdown(){
  ddBtn.classList.remove('open');
  ddPanel.classList.remove('open');
}

document.addEventListener('click', e=>{
  if(!document.getElementById('dd-wrap').contains(e.target)) closeDropdown();
});

ddSearch.addEventListener('input', renderDropdown);
ddSearch.addEventListener('click', e=> e.stopPropagation());

function renderDropdown(){
  const q = ddSearch ? ddSearch.value.toLowerCase() : '';
  const filtered = allExts.filter(e =>
    e.name.toLowerCase().includes(q) || e.id.toLowerCase().includes(q)
  );

  ddList.innerHTML = '';

  if(!allExts.length){
    ddList.innerHTML = '<div class="dd-empty">No extensions found on server</div>';
    return;
  }
  if(!filtered.length){
    ddList.innerHTML = '<div class="dd-empty">No matches</div>';
    return;
  }

  const frag = document.createDocumentFragment();
  for(const ext of filtered){
    const item = document.createElement('div');
    item.className = 'dd-item' + (selectedIds.has(ext.id) ? ' selected' : '');

    const img = document.createElement('img');
    img.src = ext.img || defaultIcon();
    img.onerror = ()=>{ img.src = defaultIcon(); };
    img.alt = '';

    const name = document.createElement('span');
    name.className = 'di-name';
    name.textContent = ext.name;

    const check = document.createElement('span');
    check.className = 'di-check';
    if(selectedIds.has(ext.id)) check.textContent = '✓';

    item.appendChild(img);
    item.appendChild(name);
    item.appendChild(check);

    item.addEventListener('click', e=>{
      e.stopPropagation();
      toggleSelect(ext.id);
    });

    frag.appendChild(item);
  }
  ddList.appendChild(frag);
  updateControls();
}

function toggleSelect(id){
  if(selectedIds.has(id)){
    selectedIds.delete(id);
  } else {
    if(selectedIds.size >= MAX_OPEN){
      notify(`Max ${MAX_OPEN} extensions at a time`,'err');
      return;
    }
    selectedIds.add(id);
  }
  renderDropdown();
  renderPills();
  updateControls();
}

function renderPills(){
  const row = document.getElementById('pills-row');
  row.innerHTML = '';
  for(const id of selectedIds){
    const ext = allExts.find(e=>e.id===id);
    if(!ext) continue;
    const pill = document.createElement('div');
    pill.className = 'pill';
    pill.title = `Remove ${ext.name}`;

    const img = document.createElement('img');
    img.src = ext.img || defaultIcon();
    img.onerror = ()=>{ img.src = defaultIcon(); };
    img.alt = '';

    const nm = document.createElement('span');
    nm.textContent = ext.name;

    const px = document.createElement('span');
    px.className = 'px';
    px.textContent = '×';

    pill.appendChild(img);
    pill.appendChild(nm);
    pill.appendChild(px);
    pill.addEventListener('click', ()=>{ toggleSelect(id); });
    row.appendChild(pill);
  }
}

function updateControls(){
  const n = selectedIds.size;
  const badge = document.getElementById('count-badge');
  const btn = document.getElementById('open-btn');
  const ph = document.getElementById('dd-placeholder');

  if(n === 0){
    badge.style.display = 'none';
    btn.disabled = true;
    ph.textContent = 'Select extensions to open…';
  } else {
    badge.style.display = '';
    badge.textContent = `${n} / ${MAX_OPEN}`;
    btn.disabled = false;
    ph.textContent = `${n} extension${n>1?'s':''} selected`;
  }
}

document.getElementById('open-btn').addEventListener('click', ()=>{
  if(!selectedIds.size) return;
  closeDropdown();

  for(const id of selectedIds){
    if(openBlocks.find(b=>b.id===id)) continue;
    if(openBlocks.length >= MAX_OPEN){
      notify(`Already at max ${MAX_OPEN} open`,'err');
      break;
    }
    const ext = allExts.find(e=>e.id===id);
    if(ext) openExtension(ext);
  }

  selectedIds.clear();
  renderPills();
  renderDropdown();
  updateControls();
});

function openExtension(ext){
  const area = document.getElementById('frames-area');
  const empty = document.getElementById('empty-state');
  if(empty) empty.style.display = 'none';

  const block = document.createElement('div');
  block.className = 'ext-block';
  block.dataset.id = ext.id;

  const hdr = document.createElement('div');
  hdr.className = 'ext-header';

  const img = document.createElement('img');
  img.src = ext.img || defaultIcon();
  img.onerror = ()=>{ img.src = defaultIcon(); };
  img.alt = '';

  const title = document.createElement('span');
  title.className = 'ext-title';
  title.textContent = ext.name;

  const idLabel = document.createElement('span');
  idLabel.className = 'ext-id';
  idLabel.textContent = ext.id;

  const closeBtn = document.createElement('button');
  closeBtn.className = 'ext-close';
  closeBtn.textContent = '×';
  closeBtn.title = 'Close';
  closeBtn.addEventListener('click', ()=> closeExtension(ext.id));

  hdr.appendChild(img);
  hdr.appendChild(title);
  hdr.appendChild(idLabel);
  hdr.appendChild(closeBtn);

  const wrap = document.createElement('div');
  wrap.className = 'ext-iframe-wrap';

  const loader = document.createElement('div');
  loader.className = 'ext-loading';
  loader.innerHTML = '<div class="spin"></div><span>Loading extension…</span>';

  const iframe = document.createElement('iframe');

  iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-modals');
  iframe.setAttribute('loading', 'lazy');
  iframe.style.opacity = '0';
  iframe.style.transition = 'opacity .35s';

  iframe.addEventListener('load', ()=>{
    loader.classList.add('gone');
    iframe.style.opacity = '1';
    setTimeout(()=> loader.remove(), 350);
  });

  if(ext.type === 'iframe' && ext.url){
    iframe.src = ext.url;
  } else {
    iframe.src = `chrome-extension://${ext.id}/index.html`;
  }

  wrap.appendChild(loader);
  wrap.appendChild(iframe);

  const resizeHandle = document.createElement('div');
  resizeHandle.className = 'resize-handle';
  resizeHandle.title = 'Drag to resize';

  let dragStartY = 0, dragStartH = 0;

  function onDragStart(e){
    dragStartY = e.touches ? e.touches[0].clientY : e.clientY;
    dragStartH = wrap.offsetHeight;
    resizeHandle.classList.add('dragging');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'ns-resize';
    const onMove = ev=>{
      const y = ev.touches ? ev.touches[0].clientY : ev.clientY;
      const newH = Math.max(120, dragStartH + (y - dragStartY));
      wrap.style.height = newH + 'px';
    };
    const onUp = ()=>{
      resizeHandle.classList.remove('dragging');
      document.body.style.userSelect = '';
      document.body.style.cursor = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, {passive:true});
    document.addEventListener('touchend', onUp);
  }

  resizeHandle.addEventListener('mousedown', onDragStart);
  resizeHandle.addEventListener('touchstart', onDragStart, {passive:true});

  block.appendChild(hdr);
  block.appendChild(wrap);
  block.appendChild(resizeHandle);
  area.appendChild(block);

  openBlocks.push({ id: ext.id, name: ext.name, img: ext.img, el: block, iframe });

  requestAnimationFrame(()=>{
    block.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}

function closeExtension(id){
  const idx = openBlocks.findIndex(b=>b.id===id);
  if(idx === -1) return;
  const b = openBlocks[idx];

  try{ b.iframe.src = 'about:blank'; } catch(e){}
  b.el.style.transition = 'opacity .25s,transform .25s';
  b.el.style.opacity = '0';
  b.el.style.transform = 'translateY(-8px)';
  setTimeout(()=>{
    b.el.remove();
    openBlocks.splice(idx, 1);
    if(openBlocks.length === 0){
      const empty = document.getElementById('empty-state');
      if(empty) empty.style.display = '';
    }
  }, 260);
}

window.addEventListener('DOMContentLoaded', ()=>{
  const params = new URLSearchParams(window.location.search);
  const qHost = params.get('ip') || params.get('host');
  const qPass = params.get('pass') || params.get('password');

  const h = qHost || localStorage.getItem('em_host');
  const p = qPass || localStorage.getItem('em_pass');
  if(h && p){
    HOST = h; PASS = p;

    localStorage.setItem('em_host', HOST);
    localStorage.setItem('em_pass', PASS);
    document.getElementById('setup-overlay').classList.add('hide');
    document.getElementById('app').classList.remove('hide');
    document.getElementById('tb-host').textContent = HOST;
    connectWS();
  }
});
</script>
</body>
</html>
