<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Server · Auto‑refresh iframe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
      background: #0a0c0f;
    }

    #iframe-layer {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      background: #0f0f0f;
    }
    #iframe-layer.active {
      display: flex;
    }

    #site-frame {
      width: 100%;
      flex: 1;
      border: none;
      background: white;
    }

    #change-bar {
      background: #111214;
      border-top: 1px solid #2a2d34;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      color: #9aa0a8;
      flex-shrink: 0;
      backdrop-filter: blur(2px);
    }

    .left-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1e2a2a;
      padding: 4px 10px;
      border-radius: 40px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.3px;
      color: #6fcf97;
    }
    .live-badge .pulse {
      width: 8px;
      height: 8px;
      background: #3fe08b;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 5px #3fe08b;
      animation: pulse-glow 1.4s infinite ease-out;
    }
    @keyframes pulse-glow {
      0% { opacity: 0.5; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); background: #6effa8; box-shadow: 0 0 8px #6effa8; }
    }

    #change-url-btn {
      color: #5b9cf6;
      cursor: pointer;
      background: none;
      border: none;
      font-size: 12.5px;
      padding: 6px 12px;
      border-radius: 20px;
      transition: all 0.2s;
      font-weight: 500;
    }
    #change-url-btn:hover {
      background: #1f2937;
      color: #7db4ff;
    }

    .auto-refresh-status {
      font-size: 12px;
      background: #1a1c22;
      padding: 4px 12px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #b9c3d4;
    }
    .refresh-icon-symbol {
      font-size: 13px;
      display: inline-block;
    }

    #setup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #setup-overlay.active {
      display: flex;
    }

    #blur-bg {
      position: absolute;
      inset: 0;
      background: rgba(8, 10, 14, 0.86);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    #setup-card {
      position: relative;
      z-index: 101;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      background: rgba(18, 22, 28, 0.75);
      backdrop-filter: blur(12px);
      padding: 40px 42px;
      border-radius: 48px;
      border: 1px solid rgba(75, 85, 99, 0.4);
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5);
      width: 380px;
      transition: all 0.2s;
    }

    #ls-icon {
      width: 68px;
      height: 68px;
      object-fit: contain;
    }

    #setup-label {
      margin-top: 22px;
      font-size: 18px;
      font-weight: 500;
      color: #f0f3fa;
      letter-spacing: -0.2px;
      transition: opacity 0.2s, transform 0.2s;
    }

    #url-input-wrap, #inline-change-wrap {
      width: 100%;
      display: none;
      margin-top: 28px;
    }
    #url-input-wrap.visible, #inline-change-wrap.visible {
      display: block;
    }

    #url-input, #inline-url-input {
      width: 100%;
      padding: 12px 16px;
      background: #0f1117;
      border: 1px solid #2d313a;
      border-radius: 44px;
      color: #f1f3f8;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
      font-family: monospace;
    }
    #url-input:focus, #inline-url-input:focus {
      border-color: #5b9cf6;
      box-shadow: 0 0 0 2px rgba(91, 156, 246, 0.2);
    }

    #continue-btn {
      margin-top: 32px;
      padding: 10px 28px;
      background: #5b9cf6;
      color: white;
      border: none;
      border-radius: 60px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      width: auto;
      min-width: 140px;
    }
    #continue-btn:hover {
      background: #4a8de4;
      transform: scale(0.98);
    }

    .note-text {
      margin-top: 20px;
      font-size: 11px;
      color: #6c7283;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="iframe-layer">
    <iframe id="site-frame" src="" allowfullscreen sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation allow-downloads"></iframe>
    <div id="change-bar">
      <div class="left-actions">
        <div class="live-badge">
          <span class="pulse"></span>
          <span>LIVE RELOAD</span>
        </div>
        <div class="auto-refresh-status" id="refresh-status-badge">
          <span class="refresh-icon-symbol">🔄</span>
          <span id="refresh-mode-text">auto‑refresh on change</span>
        </div>
      </div>
      <button id="change-url-btn">✎ change website</button>
    </div>
  </div>

  <div id="setup-overlay">
    <div id="blur-bg"></div>
    <div id="setup-card">
      <div id="icon-container">
        <svg width="68" height="68" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="13" stroke="#5b9cf6" stroke-width="1.6"/>
          <path d="M10 16L14 20L22 12" stroke="#5b9cf6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M24 26L28 28L26 24" stroke="#6c8eff" stroke-width="1.4" stroke-linecap="round"/>
          <circle cx="26" cy="26" r="2" fill="#5b9cf6" fill-opacity="0.5" stroke="#5b9cf6" stroke-width="1"/>
        </svg>
      </div>
      <div id="setup-label">Let's get you set up</div>
      <div id="url-input-wrap">
        <input id="url-input" type="url" placeholder="https:// or http:// ..." autocomplete="off" spellcheck="false"/>
      </div>
      <div id="inline-change-wrap">
        <input id="inline-url-input" type="url" placeholder="https://example.com" autocomplete="off" spellcheck="false"/>
      </div>
      <button id="continue-btn">Continue</button>
      <div class="note-text">auto‑refresh will keep iframe updated when code changes</div>
    </div>
  </div>

  <script>
    (function() {
      const LS_KEY = 'live-server-extension-url';
      let step = 1;
      let changeMode = false;
      
      const iframeLayer   = document.getElementById('iframe-layer');
      const setupOverlay  = document.getElementById('setup-overlay');
      const siteFrame     = document.getElementById('site-frame');
      const setupLabel    = document.getElementById('setup-label');
      const urlInputWrap  = document.getElementById('url-input-wrap');
      const urlInput      = document.getElementById('url-input');
      const inlineChangeWrap = document.getElementById('inline-change-wrap');
      const inlineUrlInput   = document.getElementById('inline-url-input');
      const continueBtn   = document.getElementById('continue-btn');
      const changeUrlBtn  = document.getElementById('change-url-btn');
      const refreshModeSpan = document.getElementById('refresh-mode-text');
      
      let currentReloadChannel = null;
      
      function refreshIframe() {
        if (!iframeLayer.classList.contains('active')) return;
        const currentSrc = siteFrame.src;
        if (currentSrc && currentSrc !== 'about:blank') {
          const temp = currentSrc;
          siteFrame.src = 'about:blank';
          setTimeout(() => {
            siteFrame.src = temp;
          }, 30);
          updateRefreshBadge('reloading ...', true);
          setTimeout(() => updateRefreshBadge('auto‑refresh on change', false), 1200);
        }
      }
      
      function updateRefreshBadge(text, isFlash = false) {
        if (refreshModeSpan) {
          refreshModeSpan.textContent = text;
          if (isFlash) {
            const badgeParent = document.querySelector('.auto-refresh-status');
            if (badgeParent) badgeParent.style.opacity = '0.7';
            setTimeout(() => { if (badgeParent) badgeParent.style.opacity = '1'; }, 400);
          }
        }
      }
      
      function initAutoReloadSystem() {
        try {
          if (currentReloadChannel) currentReloadChannel.close();
          currentReloadChannel = new BroadcastChannel('live_server_reload_channel');
          currentReloadChannel.onmessage = (event) => {
            if (event.data && (event.data.type === 'reload' || event.data === 'reload')) {
              refreshIframe();
            } else if (event.data && event.data.action === 'code-change') {
              refreshIframe();
            }
          };
        } catch(e) {}
        
        window.addEventListener('storage', (e) => {
          if (e.key === 'live_reload_trigger' || e.key === 'live-server-force-refresh') {
            refreshIframe();
            if (e.key === 'live_reload_trigger') localStorage.removeItem('live_reload_trigger');
          }
        });
        
        window.addEventListener('liveserver:refresh', () => refreshIframe());
        
        window.triggerLiveReload = function(message) {
          refreshIframe();
        };
        
        window.addEventListener('message', (event) => {
          if (event.data && (event.data.type === 'code-updated' || event.data === 'refresh-iframe')) {
            refreshIframe();
          }
        });
        
        updateRefreshBadge('auto‑refresh on change', false);
      }
      
      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.altKey && e.key === 'r') {
          e.preventDefault();
          refreshIframe();
          updateRefreshBadge('manual refresh', true);
          setTimeout(() => updateRefreshBadge('auto‑refresh on change', false), 1000);
        }
      });
      
      function normalizeUrl(raw) {
        raw = raw.trim();
        if (!raw) return null;
        if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
        try {
          new URL(raw);
          return raw;
        } catch { return null; }
      }
      
      function loadSite(url) {
        if (!url) return;
        siteFrame.src = url;
        setupOverlay.classList.remove('active');
        iframeLayer.classList.add('active');
        updateRefreshBadge('auto‑refresh on change', false);
      }
      
      function showSetup() {
        changeMode = false;
        step = 1;
        setupLabel.style.display = 'block';
        setupLabel.style.opacity = '1';
        setupLabel.style.transform = 'translateY(0px)';
        setupLabel.textContent = "Let's get you set up";
        urlInputWrap.classList.remove('visible');
        inlineChangeWrap.classList.remove('visible');
        setupOverlay.classList.add('active');
        iframeLayer.classList.remove('active');
      }
      
      function showChangeMode() {
        changeMode = true;
        setupLabel.style.display = 'block';
        setupLabel.style.opacity = '1';
        setupLabel.textContent = 'Change website URL';
        urlInputWrap.classList.remove('visible');
        inlineChangeWrap.classList.add('visible');
        inlineUrlInput.value = '';
        setupOverlay.classList.add('active');
        iframeLayer.classList.remove('active');
        setTimeout(() => inlineUrlInput.focus(), 80);
      }
      
      continueBtn.addEventListener('click', () => {
        if (changeMode) {
          const raw = inlineUrlInput.value;
          const url = normalizeUrl(raw);
          if (!url) {
            inlineUrlInput.style.border = '1px solid #e24b4a';
            return;
          }
          inlineUrlInput.style.border = '1px solid #2d313a';
          localStorage.setItem(LS_KEY, url);
          loadSite(url);
          return;
        }
        
        if (step === 1) {
          step = 2;
          setupLabel.style.opacity = '0';
          setupLabel.style.transform = 'translateY(-8px)';
          setTimeout(() => {
            setupLabel.style.display = 'none';
            urlInputWrap.classList.add('visible');
            setTimeout(() => urlInput.focus(), 60);
          }, 200);
          return;
        }
        
        if (step === 2) {
          const raw = urlInput.value;
          const url = normalizeUrl(raw);
          if (!url) {
            urlInput.style.border = '1px solid #e24b4a';
            return;
          }
          urlInput.style.border = '1px solid #2d313a';
          localStorage.setItem(LS_KEY, url);
          loadSite(url);
        }
      });
      
      urlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') continueBtn.click(); });
      inlineUrlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') continueBtn.click(); });
      changeUrlBtn.addEventListener('click', () => showChangeMode());
      
      siteFrame.addEventListener('error', () => {
        if (iframeLayer.classList.contains('active')) {
          updateRefreshBadge('⚠️ load error', true);
          setTimeout(() => updateRefreshBadge('auto‑refresh on change', false), 2000);
        }
      });
      
      siteFrame.addEventListener('load', () => {
        if (iframeLayer.classList.contains('active')) {
          updateRefreshBadge('connected · auto‑refresh', false);
        }
      });
      
      initAutoReloadSystem();
      
      const devHint = document.createElement('div');
      devHint.textContent = '⚡ dev: Ctrl+Alt+R → force refresh · window.triggerLiveReload()';
      devHint.style.position = 'fixed';
      devHint.style.bottom = '8px';
      devHint.style.right = '12px';
      devHint.style.fontSize = '10px';
      devHint.style.backgroundColor = '#1a1c22cc';
      devHint.style.color = '#aaa';
      devHint.style.padding = '4px 12px';
      devHint.style.borderRadius = '20px';
      devHint.style.zIndex = '1000';
      devHint.style.backdropFilter = 'blur(4px)';
      devHint.style.pointerEvents = 'none';
      devHint.style.fontFamily = 'monospace';
      document.body.appendChild(devHint);
      
      const saved = localStorage.getItem(LS_KEY);
      if (saved) {
        loadSite(saved);
      } else {
        showSetup();
      }
      
      window.__demoCodeChange = function() {
        refreshIframe();
      };
    })();
  </script>
</body>
</html>
