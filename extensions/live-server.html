<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Server · Auto-refresh iframe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
      background: #0a0c0f;
    }

    /* ── iframe layer ── */
    #iframe-layer {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      background: #0f0f0f;
    }
    #iframe-layer.active { display: flex; }

    /* ── TOP TOOLBAR ── */
    #top-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: #111214;
      border-bottom: 1px solid #23262e;
      flex-shrink: 0;
      min-height: 46px;
    }

    /* live badge */
    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #0e2218;
      border: 1px solid #1a3d2a;
      padding: 4px 11px;
      border-radius: 40px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #4ade80;
      flex-shrink: 0;
    }
    .pulse {
      width: 7px; height: 7px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse-glow 1.4s infinite ease-in-out alternate;
    }
    @keyframes pulse-glow {
      from { opacity: 0.4; transform: scale(0.8); box-shadow: 0 0 3px #4ade80; }
      to   { opacity: 1;   transform: scale(1.2); box-shadow: 0 0 8px #4ade80; }
    }

    /* url pill */
    #url-pill {
      flex: 1;
      min-width: 0;
      background: #1a1c22;
      border: 1px solid #2a2d36;
      border-radius: 8px;
      padding: 5px 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: #7a8394;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: default;
      user-select: none;
    }

    /* top buttons */
    .tb-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 13px;
      border-radius: 8px;
      border: 1px solid #2a2d36;
      background: #1a1c22;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .tb-btn:active { transform: scale(0.96); }

    #reload-btn {
      color: #60a5fa;
      border-color: #1e3a5f;
      background: #0f1e33;
    }
    #reload-btn:hover { background: #162947; border-color: #2a5080; color: #93c5fd; }
    #reload-btn.spinning svg { animation: spin 0.5s linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #change-link-btn {
      color: #a78bfa;
      border-color: #2e1f5e;
      background: #130f2a;
    }
    #change-link-btn:hover { background: #1c1540; border-color: #4c3a8a; color: #c4b5fd; }

    /* iframe */
    #site-frame {
      width: 100%;
      flex: 1;
      border: none;
      background: white;
    }

    /* ── bottom status bar ── */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 16px;
      background: #0d0f13;
      border-top: 1px solid #1e2026;
      font-size: 11px;
      color: #4a5060;
      flex-shrink: 0;
    }
    #status-text { color: #3d9e60; }
    .status-sep { color: #23262e; }
    #dev-hint { font-family: monospace; color: #3a3f4c; margin-left: auto; }

    /* ── setup overlay ── */
    #setup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #setup-overlay.active { display: flex; }

    #blur-bg {
      position: absolute;
      inset: 0;
      background: rgba(7, 9, 13, 0.88);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    #setup-card {
      position: relative;
      z-index: 101;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(16, 20, 27, 0.8);
      backdrop-filter: blur(14px);
      padding: 42px 44px;
      border-radius: 28px;
      border: 1px solid rgba(60, 70, 90, 0.45);
      box-shadow: 0 30px 50px -10px rgba(0,0,0,0.6);
      width: 370px;
    }

    #setup-label {
      margin-top: 20px;
      font-size: 18px;
      font-weight: 500;
      color: #edf0fa;
      letter-spacing: -0.2px;
      transition: opacity 0.2s, transform 0.2s;
    }

    #url-input-wrap, #inline-change-wrap {
      width: 100%;
      display: none;
      margin-top: 26px;
    }
    #url-input-wrap.visible, #inline-change-wrap.visible { display: block; }

    #url-input, #inline-url-input {
      width: 100%;
      padding: 11px 17px;
      background: #0c0e15;
      border: 1px solid #2a2e38;
      border-radius: 40px;
      color: #edf0fa;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    #url-input:focus, #inline-url-input:focus {
      border-color: #5b9cf6;
      box-shadow: 0 0 0 3px rgba(91,156,246,0.18);
    }

    #continue-btn {
      margin-top: 28px;
      padding: 10px 32px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      min-width: 130px;
    }
    #continue-btn:hover { background: #2563eb; }
    #continue-btn:active { transform: scale(0.97); }

    .note-text {
      margin-top: 18px;
      font-size: 11px;
      color: #555d70;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- ── IFRAME LAYER ── -->
  <div id="iframe-layer">

    <!-- TOP TOOLBAR -->
    <div id="top-bar">

      <div class="live-badge">
        <span class="pulse"></span>
        LIVE
      </div>

      <!-- Reload button -->
      <button class="tb-btn" id="reload-btn" title="Reload page (Ctrl+Alt+R)">
        <svg width="13" height="13" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v5h5"/>
          <path d="M17 14v-5h-5"/>
          <path d="M15.51 7A7 7 0 1 0 16 11"/>
        </svg>
        Reload
      </button>

      <!-- URL display -->
      <div id="url-pill">about:blank</div>

      <!-- Change link button -->
      <button class="tb-btn" id="change-link-btn" title="Change website URL">
        <svg width="13" height="13" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h6"/>
          <polyline points="13 3 17 3 17 7"/>
          <line x1="8" y1="10" x2="17" y2="3"/>
        </svg>
        Change link
      </button>

    </div>

    <!-- IFRAME -->
    <iframe id="site-frame" src="" allowfullscreen
      sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation allow-downloads">
    </iframe>

    <!-- BOTTOM STATUS BAR -->
    <div id="status-bar">
      <span id="status-text">● auto-refresh active</span>
      <span class="status-sep">|</span>
      <span>BroadcastChannel · storage · postMessage</span>
      <span id="dev-hint">Ctrl+Alt+R — force reload · window.triggerLiveReload()</span>
    </div>

  </div>

  <!-- ── SETUP OVERLAY ── -->
  <div id="setup-overlay">
    <div id="blur-bg"></div>
    <div id="setup-card">

      <svg width="62" height="62" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="13" stroke="#3b82f6" stroke-width="1.6"/>
        <path d="M10 16L14 20L22 12" stroke="#3b82f6" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M24 26L28 28L26 24" stroke="#818cf8" stroke-width="1.4" stroke-linecap="round"/>
        <circle cx="26" cy="26" r="2.2" fill="#3b82f6" fill-opacity="0.45" stroke="#3b82f6" stroke-width="1"/>
      </svg>

      <div id="setup-label">Let's get you set up</div>

      <div id="url-input-wrap">
        <input id="url-input" type="url" placeholder="https:// or http:// ..." autocomplete="off" spellcheck="false"/>
      </div>
      <div id="inline-change-wrap">
        <input id="inline-url-input" type="url" placeholder="https://example.com" autocomplete="off" spellcheck="false"/>
      </div>

      <button id="continue-btn">Continue</button>
      <p class="note-text">auto-refresh keeps the iframe updated whenever your code changes</p>
    </div>
  </div>

  <script>
    (function () {
      const LS_KEY = 'live-server-url-v2';
      let step = 1, changeMode = false;

      const iframeLayer      = document.getElementById('iframe-layer');
      const setupOverlay     = document.getElementById('setup-overlay');
      const siteFrame        = document.getElementById('site-frame');
      const setupLabel       = document.getElementById('setup-label');
      const urlInputWrap     = document.getElementById('url-input-wrap');
      const urlInput         = document.getElementById('url-input');
      const inlineChangeWrap = document.getElementById('inline-change-wrap');
      const inlineUrlInput   = document.getElementById('inline-url-input');
      const continueBtn      = document.getElementById('continue-btn');
      const reloadBtn        = document.getElementById('reload-btn');
      const changeLinkBtn    = document.getElementById('change-link-btn');
      const urlPill          = document.getElementById('url-pill');
      const statusText       = document.getElementById('status-text');

      let reloadChannel = null;

      /* ── helpers ── */
      function setStatus(msg, color) {
        statusText.textContent = msg;
        statusText.style.color = color || '#3d9e60';
      }

      function updateUrlPill(url) {
        try { urlPill.textContent = new URL(url).href; } catch { urlPill.textContent = url; }
      }

      /* ── reload ── */
      function refreshIframe() {
        if (!iframeLayer.classList.contains('active')) return;
        const src = siteFrame.src;
        if (!src || src === 'about:blank') return;

        siteFrame.src = 'about:blank';
        setTimeout(() => { siteFrame.src = src; }, 30);

        setStatus('↻ reloading…', '#60a5fa');
        reloadBtn.classList.add('spinning');
        setTimeout(() => {
          reloadBtn.classList.remove('spinning');
          setStatus('● auto-refresh active', '#3d9e60');
        }, 900);
      }

      /* ── auto-reload listeners ── */
      function initAutoReload() {
        try {
          if (reloadChannel) reloadChannel.close();
          reloadChannel = new BroadcastChannel('live_server_reload_channel');
          reloadChannel.onmessage = (e) => {
            if (e.data && (e.data.type === 'reload' || e.data === 'reload' || e.data.action === 'code-change'))
              refreshIframe();
          };
        } catch (_) {}

        window.addEventListener('storage', (e) => {
          if (e.key === 'live_reload_trigger' || e.key === 'live-server-force-refresh') {
            refreshIframe();
            if (e.key === 'live_reload_trigger') localStorage.removeItem('live_reload_trigger');
          }
        });

        window.addEventListener('liveserver:refresh', refreshIframe);

        window.addEventListener('message', (e) => {
          if (e.data && (e.data.type === 'code-updated' || e.data === 'refresh-iframe'))
            refreshIframe();
        });

        window.triggerLiveReload = refreshIframe;
      }

      /* ── keyboard shortcut ── */
      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.altKey && e.key === 'r') { e.preventDefault(); refreshIframe(); }
      });

      /* ── url helpers ── */
      function normalizeUrl(raw) {
        raw = raw.trim();
        if (!raw) return null;
        if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
        try { new URL(raw); return raw; } catch { return null; }
      }

      function loadSite(url) {
        siteFrame.src = url;
        updateUrlPill(url);
        setupOverlay.classList.remove('active');
        iframeLayer.classList.add('active');
        setStatus('● auto-refresh active', '#3d9e60');
      }

      /* ── setup flow ── */
      function showSetup() {
        changeMode = false; step = 1;
        setupLabel.style.cssText = 'display:block;opacity:1;transform:translateY(0)';
        setupLabel.textContent = "Let's get you set up";
        urlInputWrap.classList.remove('visible');
        inlineChangeWrap.classList.remove('visible');
        setupOverlay.classList.add('active');
        iframeLayer.classList.remove('active');
      }

      function showChangeMode() {
        changeMode = true;
        setupLabel.style.cssText = 'display:block;opacity:1;transform:translateY(0)';
        setupLabel.textContent = 'Change website URL';
        urlInputWrap.classList.remove('visible');
        inlineChangeWrap.classList.add('visible');
        inlineUrlInput.value = '';
        setupOverlay.classList.add('active');
        iframeLayer.classList.remove('active');
        setTimeout(() => inlineUrlInput.focus(), 80);
      }

      /* ── continue button ── */
      continueBtn.addEventListener('click', () => {
        if (changeMode) {
          const url = normalizeUrl(inlineUrlInput.value);
          if (!url) { inlineUrlInput.style.borderColor = '#e24b4a'; return; }
          inlineUrlInput.style.borderColor = '#2a2e38';
          localStorage.setItem(LS_KEY, url);
          loadSite(url);
          return;
        }
        if (step === 1) {
          step = 2;
          setupLabel.style.opacity = '0';
          setupLabel.style.transform = 'translateY(-8px)';
          setTimeout(() => {
            setupLabel.style.display = 'none';
            urlInputWrap.classList.add('visible');
            setTimeout(() => urlInput.focus(), 60);
          }, 200);
          return;
        }
        if (step === 2) {
          const url = normalizeUrl(urlInput.value);
          if (!url) { urlInput.style.borderColor = '#e24b4a'; return; }
          urlInput.style.borderColor = '#2a2e38';
          localStorage.setItem(LS_KEY, url);
          loadSite(url);
        }
      });

      urlInput.addEventListener('keydown',       (e) => { if (e.key === 'Enter') continueBtn.click(); });
      inlineUrlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') continueBtn.click(); });

      reloadBtn.addEventListener('click',     refreshIframe);
      changeLinkBtn.addEventListener('click', showChangeMode);

      siteFrame.addEventListener('load', () => {
        if (iframeLayer.classList.contains('active'))
          setStatus('● connected · auto-refresh', '#3d9e60');
      });

      /* ── init ── */
      initAutoReload();

      const saved = localStorage.getItem(LS_KEY);
      if (saved) loadSite(saved); else showSetup();

      window.__demoCodeChange = refreshIframe;
    })();
  </script>
</body>
  </html>
